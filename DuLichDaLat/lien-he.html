		<!-- Form Liên hệ -->
		<!--1. Xây dựng khung nền -->
		<section class="section has-background-light">
			<div class="container">
				<!--2. Chia đôi màn hình-->
				<div class="columns is-vcentered"> <!-- vcentered giúp 2 cột luôn căn giữa bằng nhau theo chiều dọc-->
					<div class="column is-5">
						<h1 class="title is-2 has-text-primary">Liên hệ với Ân Phúc</h1>
						<p class="subtitle is-5 mt-4">Luôn luôn lắng nghe, luôn luôn hoàn thiện</p>
						<figure class="image mt-6" style="border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
							<img src="images/lien-lac.jpeg" alt="Đà Lạt thân yêu">
						</figure>
					</div>
					
					<div class="column is-7">
						<div class="box p-6" style="border-radius: 25px;">
							<!-- From liên hệ -->
							<div class="field">
								<label class="label">Họ và tên</label>
								<div class="control has-icons-left">
									<input class="input" type="text" placeholder="Viết in hoa toàn bộ chữ cái ví dụ: NGUYỄN VĂN A">
									<span class="icon is-small is-left">
										<i class="fas fa-user"></i>
									</span>
								</div>
							</div>

							<div class="field">
								<label class="label">Email</label>
								<div class="control has-icons-left">
									<input class="input " type="email" placeholder="Nhập email ví dụ như: nguyenA@gmail.com"> <!-- Xóa is-danger: viền đỏ; value="hello@: làm cho ô lúc nào cũng hiện chữ "hello@-->
									<span class="icon is-small is-left">
										<i class="fas fa-envelope"></i>
									</span>
									 <!-- Xóa luôn khối lệnh icon bên phải: <span class="icon is-small is-right">...</span>-->
									 <!--Xóa: <i class="fas fa-exclamation-triangle"></i>: icon dấu chấm than-->
								</div>
							   <!-- Xóa dòng này: <p class="help is-danger">This email is invalid</p> -->
							</div>

							<div class="field">
							  <label class="label">Lời nhắn</label>
							  <div class="control">
								<textarea class="textarea" placeholder="Lời nhắn hoặc mô tả vấn đề của bạn"></textarea>
							  </div>
							</div>

							<div class="field mt-5">
							  <div class="control">
								<button class="button is-primary is-fullwidth is-medium" style="border-radius: 15px;">Xác nhận gửi</button> <!-- is-link là màu xanh dương -->
							  </div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</section>

		<footer class="footer">
